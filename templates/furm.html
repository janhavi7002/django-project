{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Registration</title>
  <link rel="stylesheet" href="{% static 'purple.css' %}">
</head>
<script>

let componentCount = 1;

function addComponent() {

    componentCount++;

    const container = document.getElementById("components-container");

    const div = document.createElement("div");

    div.classList.add("component-row");

    div.innerHTML = `
        <label>Component ${componentCount}</label>

        <input
            type="text"
            name="component_name[]"
            placeholder="Enter Component Name"
            required
        >

        <input
            type="number"
            name="quantity[]"
            placeholder="Enter Quantity"
            min="1"
            required
        >
    `;

    container.appendChild(div);
}

</script>
<body>
  <div class="form-container">
        {% if error %}
       <div class="error-box">
        {{ error }}
        </div>
        {% endif %}

        {% if success %}
        <p style="color: white;">✔️ Form submitted successfully!</p>
        {% endif %}

    <h2>Enter your details</h2>
      <form class="anime-form" method="POST">
        {% csrf_token %}

        <input type="text" name="name" value="{{user.username}}" readonly/>
        <input type="email" name="email"value="{{user.email}}" readonly />
        <input type="text" name="admission_number" placeholder="Admission Number" required />
        <select name="branch" required>
    <option value="">Select Branch</option>
    <option value="Automobile Engineering">Automobile Engineering </option>
    <option value="Computer Engineering">Computer Engineering</option>
    <option value="Electronics & Computer Science">Electronics & Computer Science</option>
    <option value="Electronics & Telecommunication">Electronics & Telecommunication</option>
    <option value="Information Technology">Information Technology</option>
    <option value="Mechanical Engineering">Mechanical Engineering</option>
    <option value="Applied Science and Mathematics">Applied Science and Mathematics</option>
</select>
        <input type="number" name="year" min="1" max="4" placeholder="Year" required />
        <input type="tel" name="contact_number" pattern="[0-9]{10}" maxlength="10" placeholder="10-digit Contact Number" required/>
        <div id="components-container">

    <div class="component-row">
        <label>Component 1</label>
        <input
            type="text"
            name="component_name[]"
            placeholder="Enter Component Name"
            required
        >

        <input type="number"
             name="quantity[]"
             placeholder="Qty"
             min="1"
             value="1"
             required>
    </div>

</div>

<button
    type="button"
    class="add-btn"
    onclick="addComponent()"
>
    + Add Another Component
</button>
        <input type="date" name="componentissue_date" required />
        <input type="date" name="componentdue_date" required/>
        <input type="text" name="faculty_referred" placeholder="Faculty Referred" required />

        <button type="submit">Submit</button>
      </form>
        
  </div>

</body>
</html>
